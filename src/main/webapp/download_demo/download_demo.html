<!DOCTYPE html>
<html lang="pt">
<head>
    <script>(function(){var p=location.pathname;var b=p.indexOf("/SimuladorSIBS/")!==-1?"/SimuladorSIBS/":"/";var e=document.createElement("base");e.href=b;document.head.prepend(e);}());</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Download de Demonstração</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.1/mdb.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/gateway/css/gateway_css.css">
    <link rel="stylesheet" href="/navbar/css/navbar_css.css">
    <link rel="stylesheet" href="/footer/css/footer_css.css">
    <link rel="stylesheet" href="/download_demo/css/download_demo_css.css">

</head>

<body>

    <div id="navbar"></div>

    <!--Main - Colocar o valor do Refund-->
    <main class="container py-5">
      <div class="dashboard-header shadow-sm card p-3" style="background: #49b2ff12;">
          <div class="brand-container d-flex align-items-center justify-content-between w-100">
              <div class="d-flex align-items-center">
                  <div class="logo-square me-3">
                      <i class="fa-solid fa-file-arrow-down"></i>
                  </div>
                  <div class="title-group">
                      <span style="font-size: 22px; color: #202124; letter-spacing: -0.5px;">
                          <b style="font-weight: 400;">Gateway</b>
                          <b style="font-weight: 600;">SIBS</b>
                          <span style="color: #dadce0; margin: 0 8px; font-weight: 300;">|</span>
                          <span style="color: #5f6368; font-weight: 400;">Download de Demonstração</span>
                      </span>
                  </div>
              </div>
          </div>

          <div class="card-body p-4 p-md-5">
              <div class="download-section p-4 p-md-5 rounded-4 text-center">
                  <div class="mb-4">
                      <p class="text-muted mb-0 mx-auto" style="max-width: 1050px; line-height: 1.6;">
                          Transfira o código de exemplo completo, incluindo todos os <strong>payloads</strong> necessários para a integração com a nossa gateway.
                      </p>
                  </div>

                  <div class="mb-4">
                    <a id="downloadBtn" class="btn btn-lg px-5 py-3 d-inline-flex align-items-center" 
                        style="background: #0049ff; color: white; border-radius: 12px; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                        <i class="fas fa-file-export me-3"></i> 
                        Descarregar Pacote .zip
                    </a>
                  </div>

                  <div class="d-flex flex-wrap justify-content-center gap-3 mt-2">
                      <div class="px-3 py-2 rounded-pill bg-light border d-flex align-items-center" style="font-size: 0.85rem; color: #5f6368;">
                          <i class="fas fa-file-code me-2 text-primary"></i>
                          <span class="fw-bold">JSON / XML</span>
                      </div>
                      <div class="px-3 py-2 rounded-pill bg-light border d-flex align-items-center" style="font-size: 0.85rem; color: #5f6368;">
                          <i class="fas fa-check-circle me-2 text-success"></i>
                          <span>Ficheiro Seguro</span>
                      </div>
                      <div class="px-3 py-2 rounded-pill bg-light border d-flex align-items-center" style="font-size: 0.85rem; color: #5f6368;">
                          <i class="fas fa-hdd me-2 text-warning"></i>
                          <span>2.4 MB</span>
                      </div>
                  </div>
              </div>

              <p class="text-center mt-4 mb-0 small text-muted">
                  Dúvidas na implementação? <a href="https://www.docs.pay.sibs.com/" class="text-decoration-none fw-bold" style="color: #007bff;">Aceda à Documentação Técnica</a>
              </p>
          </div>
      </div>
    </main>

    <div id="js_index"></div>

    <div id="footer"></div>

    <script>

        // Carregar o ficheiro footer
        fetch("footer/footer_layout.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("footer").innerHTML = html;
        })
        .catch(err => console.error("Erro ao carregar footer:", err));

        // Carregar o ficheiro navbar
        fetch("navbar/navbar_gateway_pages.html")
        .then(res => res.text())
        .then(html => {
            document.getElementById("navbar").innerHTML = html;
        })
        .catch(err => console.error("Erro ao carregar navbar:", err));

    </script>

<!--Carregar o js-->
<script src="/download_demo/js/download_demo_js.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
